name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-modules:
    name: Validate Modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - shared/modules/config-recorder
          - shared/modules/config-rule
          - shared/modules/config-compliance-dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5"
      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init -backend=false
      - name: Terraform Format
        run: terraform -chdir=${{ matrix.module }} fmt -check
      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.module }} validate

  validate-labs:
    name: Validate Labs
    runs-on: ubuntu-latest
    needs: validate-modules
    strategy:
      fail-fast: false
      matrix:
        lab:
          - labs/01-config-rules-compliance-baseline/infrastructure/terraform
          - labs/02-custom-rules-conformance-packs/infrastructure/terraform
          - labs/03-ssm-automation-ec2-remediation/infrastructure/terraform
          - labs/04-ebs-volume-cleanup-with-config-remediation/infrastructure/terraform
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5"
      - name: Terraform Init
        run: terraform -chdir=${{ matrix.lab }} init -backend=false
      - name: Terraform Format
        run: terraform -chdir=${{ matrix.lab }} fmt -check
      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.lab }} validate
